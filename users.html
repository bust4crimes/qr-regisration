<!DOCTYPE html>
<html>
<head>

<title>Registered Users</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#6dd5ed,#2193b0);
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:12px;
max-width:800px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ccc;
text-align:left;
}

th{
background:#2193b0;
color:white;
}

button{
margin-top:20px;
padding:12px;
background:#2193b0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Registered Participants</h2>

<table id="table">

<tr>
<th>Name</th>
<th>Address</th>
<th>Age</th>
<th>Contact</th>
<th>Gender</th>
</tr>

</table>

<button onclick="goBack()">Back</button>

</div>

<script>

let users=JSON.parse(localStorage.getItem("users"))||[]

let table=document.getElementById("table")

users.forEach(user=>{

let row=table.insertRow()

row.insertCell(0).innerText=user.name
row.insertCell(1).innerText=user.address
row.insertCell(2).innerText=user.age
row.insertCell(3).innerText=user.contact
row.insertCell(4).innerText=user.gender

})

function goBack(){
window.location.href="index.html"
}

</script>

</body>
</html>
