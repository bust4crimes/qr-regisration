<!DOCTYPE html>
<html>
<head>

<title>Program Registration</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:420px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:14px;
font-size:16px;
background:green;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

</style>

</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<form action="success.html">

<input type="text" placeholder="Full Name" required>

<input type="text" placeholder="Address" required>

<input type="number" placeholder="Age" required>

<input type="text" placeholder="Contact Number" required>

<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
