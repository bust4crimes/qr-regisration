<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registered Participants</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6dd5ed,#2193b0);
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:95%;
max-width:800px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2193b0;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

tr:hover{
background:#f5f5f5;
}

button{
margin-top:20px;
padding:12px;
width:120px;
border:none;
border-radius:6px;
background:#2193b0;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#176b82;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.count{
font-weight:bold;
color:#2193b0;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">
<h1>Registered Participants</h1>
<div class="count" id="count"></div>
</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Address</th>
<th>Age</th>
<th>Contact</th>
<th>Gender</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

<button onclick="goBack()">Back</button>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

let table = document.getElementById("userTable");

document.getElementById("count").innerText =
"Total: " + users.length;

users.forEach(user => {

let row = `<tr>
<td>${user.name}</td>
<td>${user.address}</td>
<td>${user.age}</td>
<td>${user.contact}</td>
<td>${user.gender}</td>
</tr>`;

table.innerHTML += row;

});

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
