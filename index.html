<!DOCTYPE html>
<html>
<head>

<title>Program Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6dd5ed,#2193b0);
}

.container{
background:white;
padding:35px;
border-radius:15px;
width:90%;
max-width:500px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#2193b0;
margin-bottom:20px;
font-size:28px;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

input:focus,select:focus{
outline:none;
border-color:#2193b0;
}

button{
width:100%;
padding:16px;
margin-top:10px;
font-size:18px;
background:#2193b0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1b7c95;
}

</style>

</head>

<body>

<div class="container">

<h2>Program Registration</h2>

<form action="success.html">

<input type="text" placeholder="Full Name" required>

<input type="text" placeholder="Address" required>

<input type="number" placeholder="Age" required>

<input type="text" placeholder="Contact Number" required>

<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
