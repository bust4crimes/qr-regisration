<!DOCTYPE html>
<html>
<head>

<title>Registration Complete</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#56ab2f,#a8e063);
}

.box{
background:white;
padding:40px;
border-radius:15px;
width:90%;
max-width:500px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.check{
font-size:60px;
color:#4CAF50;
}

h1{
margin-top:10px;
color:#2e7d32;
}

p{
font-size:18px;
color:#555;
}

button{
margin-top:25px;
padding:16px;
font-size:18px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#3e8e41;
}

</style>

</head>

<body>

<div class="box">

<div class="check">✔</div>

<h1>Congratulations!</h1>

<p>You are now part of the program.</p>

<button onclick="goBack()">OK</button>

</div>

<script>

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
