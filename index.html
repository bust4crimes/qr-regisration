<!DOCTYPE html>
<html>
<head>

<title>Program Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#6dd5ed,#2193b0);
}

.container{
  background:white;
  padding:35px;
  border-radius:15px;
  width:90%;
  max-width:500px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  color:#2193b0;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:14px;
  margin:10px 0;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:16px;
  margin-top:10px;
  font-size:18px;
  background:#2193b0;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1b7c95;
}

.view{
  margin-top:10px;
  background:#555;
}

</style>

</head>

<body>

<div class="container">

<h2>Program Registration</h2>

<form id="regForm" onsubmit="registerUser(event)">

<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="address" placeholder="Address" required>
<input type="number" id="age" placeholder="Age" required>
<input type="text" id="contact" placeholder="Contact Number" required>

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<button type="submit">Register</button>

</form>

<button class="view" onclick="viewUsers()">View Registered Users</button>

</div>

<script>
function registerUser(event){
  event.preventDefault();

  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let age = document.getElementById("age").value;
  let contact = document.getElementById("contact").value;
  let gender = document.getElementById("gender").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  // Create new user object
  let newUser = {name, address, age, contact, gender};

  // Save user to localStorage
  users.push(newUser);
  localStorage.setItem("users", JSON.stringify(users));

  // Reset form
  document.getElementById("regForm").reset();

  // Go to success page
  window.location.href = "success.html";
}

function viewUsers(){
  window.location.href = "users.html";
}
</script>

</body>
</html>
